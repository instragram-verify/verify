<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram</title>

<!-- Instagram font style -->
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

<style>
body {
    background-color: #fafafa;
    font-family: Arial, sans-serif;
    margin: 0;
}

/* Center everything */
.main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login box */
.container {
    width: 350px;
    background: #fff;
    border: 1px solid #dbdbdb;
    padding: 40px 30px;
    text-align: center;
}

/* Instagram text logo */
.logo-text {
    font-family: 'Grand Hotel', cursive;
    font-size: 50px;
    margin-bottom: 30px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border: 1px solid #dbdbdb;
    background: #fafafa;
    border-radius: 3px;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background-color: #3897f0;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #1877f2;
}

/* OR divider */
.divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    color: #8e8e8e;
    font-size: 13px;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #dbdbdb;
    margin: 0 10px;
}

/* Forgot password */
.forgot {
    color: #00376b;
    font-size: 12px;
    margin-top: 15px;
    cursor: pointer;
}

/* Message */
#loginMessage {
    margin-top: 10px;
    font-size: 14px;
}

.success { color: green; }
.error { color: red; }

</style>
</head>

<body>

<div class="main">
    <div class="container">

        <div class="logo-text">Instagram</div>

        <form onsubmit="return login()">

            <input type="text" id="username" placeholder="Phone number, username, or email" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Log In</button>

            <div class="divider">OR</div>

            <div class="forgot">Forgot password?</div>

            <p id="loginMessage"></p>

        </form>

    </div>
</div>

<script>
function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;
    let msg = document.getElementById("loginMessage");

    if(u && p){
        msg.className = "success";
        msg.innerHTML = "Login Successful (Demo)";
    } else {
        msg.className = "error";
        msg.innerHTML = "Enter valid details";
    }

    return false;
}
</script>

</body>
</html>
