<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Demo</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #fafafa;
    margin: 0;
    padding: 0;
}

.logo {
    text-align: center;
    margin-top: 40px;
}

.logo img {
    width: 180px;
}

.container {
    width: 350px;
    margin: 20px auto;
    background-color: #fff;
    border: 1px solid #dbdbdb;
    padding: 40px;
    text-align: center;
}

h1 {
    font-family: cursive;
    font-size: 32px;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
}

input {
    background: #fafafa;
    border: 1px solid #dbdbdb;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 3px;
    font-size: 14px;
}

input:focus {
    outline: none;
    border: 1px solid #a8a8a8;
}

button {
    background-color: #3897f0;
    color: white;
    border: none;
    padding: 10px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background-color: #1877f2;
}

#loginMessage {
    font-size: 14px;
    margin-top: 10px;
}

.success {
    color: #2ecc71;
}

.error {
    color: #e74c3c;
}

.forgot {
    margin-top: 15px;
    font-size: 14px;
    color: #00376b;
    cursor: pointer;
}

@media (max-width: 600px) {
    .container {
        width: 90%;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="logo">
    <!-- You can replace this with your local image -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Logo">
</div>

<div class="container">
    <form onsubmit="return login()">
        <h1>Instagram</h1>

        <input type="text" id="username" placeholder="Phone number, username, or email" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Log In</button>

        <p id="loginMessage"></p>

        <div class="forgot">Forgot password?</div>
    </form>
</div>

<script>
function login() {
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;
    var message = document.getElementById('loginMessage');

    if (username !== "" && password !== "") {
        message.className = "success";
        message.innerHTML = "Login Successful (Demo Only)";
    } else {
        message.className = "error";
        message.innerHTML = "Please fill all fields correctly.";
    }

    return false;
}
</script>

</body>
</html>
